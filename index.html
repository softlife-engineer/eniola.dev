    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else if (theme === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            // Default to dark mode when there is no saved preference
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
